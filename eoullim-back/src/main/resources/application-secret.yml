server:
  port: 8080

logging:
  level:
    root: INFO
    com.example: DEBUG

spring:
  mustache:
    servlet:
      expose-session-attributes: true
      expose-request-attributes: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/eoullim?serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: root

  sql:
    init:
      mode: never
      data-locations:
        - classpath:db/data.sql

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  servlet:
    encoding:
      charset: utf-8
      force: true
