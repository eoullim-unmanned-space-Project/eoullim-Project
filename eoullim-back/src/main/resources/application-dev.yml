server:
  servlet:
    encoding:
      charset: utf-8
      force: true
  port: 8080

logging:
  level:
    root: INFO
    com.example: DEBUG

spring:
  mustache:
    servlet:
      expose-session-attributes: true
      expose-request-attributes: true

#  datasource:
#    driver-class-name: org.h2.Driver
#    # MODE=MySQL: H2를 MySQL 호환 모드로 실행
#    url: jdbc:h2:mem:test;MODE=MySQL
#    username:
#    password:

  h2:
    console:
      enabled: true

  sql:
    init:
      mode: always
      data-locations:

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true